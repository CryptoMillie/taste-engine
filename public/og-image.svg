<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1A1713"/>
      <stop offset="100%" stop-color="#0D0B09"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#FF3B1F" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#FF3B1F" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FF3B1F" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left card silhouette -->
  <rect x="80" y="140" width="340" height="380" rx="22" fill="#232019" stroke="#3A362E" stroke-width="1.5"/>
  <rect x="80" y="140" width="340" height="380" rx="22" fill="#FF3B1F" opacity="0.06"/>
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="32" fill="#F4F2EC" opacity="0.9">Pizza</text>
  <text x="250" y="395" text-anchor="middle" font-family="monospace" font-size="13" fill="#6B6459" letter-spacing="2">ITALIAN DISH</text>

  <!-- VS badge -->
  <circle cx="600" cy="330" r="48" fill="#FF3B1F"/>
  <text x="600" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF">VS</text>

  <!-- Right card silhouette -->
  <rect x="780" y="140" width="340" height="380" rx="22" fill="#232019" stroke="#3A362E" stroke-width="1.5"/>
  <rect x="780" y="140" width="340" height="380" rx="22" fill="#FF3B1F" opacity="0.06"/>
  <text x="950" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="32" fill="#F4F2EC" opacity="0.9">Sushi</text>
  <text x="950" y="395" text-anchor="middle" font-family="monospace" font-size="13" fill="#6B6459" letter-spacing="2">JAPANESE DISH</text>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="58" fill="#F4F2EC" letter-spacing="-1.5">TASTE ENGINE</text>

  <!-- Tagline -->
  <text x="600" y="118" text-anchor="middle" font-family="monospace" font-size="16" fill="#FF3B1F" letter-spacing="5">WHICH DO YOU PREFER?</text>

  <!-- Bottom pill categories -->
  <rect x="310" y="558" width="80" height="30" rx="15" fill="#2A261F"/>
  <text x="350" y="578" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B6459" letter-spacing="1">SPORTS</text>

  <rect x="405" y="558" width="66" height="30" rx="15" fill="#2A261F"/>
  <text x="438" y="578" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B6459" letter-spacing="1">FOOD</text>

  <rect x="486" y="558" width="66" height="30" rx="15" fill="#2A261F"/>
  <text x="519" y="578" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B6459" letter-spacing="1">TECH</text>

  <rect x="567" y="558" width="86" height="30" rx="15" fill="#2A261F"/>
  <text x="610" y="578" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B6459" letter-spacing="1">CULTURE</text>

  <rect x="668" y="558" width="86" height="30" rx="15" fill="#2A261F"/>
  <text x="711" y="578" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B6459" letter-spacing="1">ANIMALS</text>

  <rect x="769" y="558" width="66" height="30" rx="15" fill="#2A261F"/>
  <text x="802" y="578" text-anchor="middle" font-family="monospace" font-size="11" fill="#6B6459" letter-spacing="1">CARS</text>

  <!-- Decorative corner accents -->
  <path d="M30 60 L30 30 L60 30" stroke="#FF3B1F" stroke-width="2.5" fill="none" opacity="0.4"/>
  <path d="M1140 30 L1170 30 L1170 60" stroke="#FF3B1F" stroke-width="2.5" fill="none" opacity="0.4"/>
  <path d="M30 570 L30 600 L60 600" stroke="#FF3B1F" stroke-width="2.5" fill="none" opacity="0.4"/>
  <path d="M1140 600 L1170 600 L1170 570" stroke="#FF3B1F" stroke-width="2.5" fill="none" opacity="0.4"/>
</svg>
